name: BlockProxy
options:
  bundleIdPrefix: com.blockproxy
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  groupSortPosition: top

schemes:
  BlockProxy:
    build:
      targets:
        BlockProxy: all
        TunnelExtension: all
        BlockProxyTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - BlockProxyTests
    archive:
      config: Release

targets:
  BlockProxy:
    type: application
    platform: iOS
    sources:
      - path: BlockProxy
        excludes:
          - "**/*.md"
    settings:
      base:
        INFOPLIST_FILE: BlockProxy/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.blockproxy
        CODE_SIGN_ENTITLEMENTS: BlockProxy/BlockProxy.entitlements
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: BlockProxy
        INFOPLIST_KEY_LSRequiresIPhoneOS: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_KeychainAccessGroup: "$(AppIdentifierPrefix)com.blockproxy"
        SWIFT_VERSION: "5.9"
        DEVELOPMENT_TEAM: ""
    dependencies:
      - target: TunnelExtension
    preBuildScripts: []

  TunnelExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: TunnelExtension
        excludes:
          - "**/*.md"
      # Shared source files needed by the extension
      - path: BlockProxy/Models/ServerConfig.swift
      - path: BlockProxy/Models/TunnelStatus.swift
      - path: BlockProxy/Utils/ConfigStore.swift
      - path: BlockProxy/Utils/KeychainHelper.swift
    settings:
      base:
        INFOPLIST_FILE: TunnelExtension/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.blockproxy.tunnel-extension
        CODE_SIGN_ENTITLEMENTS: TunnelExtension/TunnelExtension.entitlements
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_KEY_KeychainAccessGroup: "$(AppIdentifierPrefix)com.blockproxy"
        SWIFT_VERSION: "5.9"
        DEVELOPMENT_TEAM: ""
    dependencies: []

  BlockProxyTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: BlockProxyTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.blockproxy.tests
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "5.9"
        DEVELOPMENT_TEAM: ""
    dependencies:
      - target: BlockProxy
